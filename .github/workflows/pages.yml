# Désactivé — remplacé par AWS Amplify (frontend) + App Runner (backend)
name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      disabled:
        description: "This workflow is disabled. Use AWS Amplify instead."
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
