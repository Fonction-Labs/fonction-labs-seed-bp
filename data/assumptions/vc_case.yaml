fde_billable:
  # Revenue service FDE = UC en run × FDE ratio × day_rate × days × utilization
  # Remplace service_forecast_baseline + fde_support_revenue (supprimés — étaient des valeurs non dérivées).
  # Les UC en DEPLOIEMENT génèrent du deployment_revenue (40k/UC sur 3 mois) — pas ici.
  # Les UC en RUN génèrent du service FDE (amélioration continue, support, petits sprints).
  days_billable_per_month: 18
  # Utilization décroît avec la maturité plateforme (phase 1 → phase 3).
  # Phase transitoire (2027) : FDE très sollicités, facturation élevée.
  # Phase cible (2028+) : plateforme self-serve croissante, FDE focus nouveaux UC.
  utilization_rate:
    2026_h2: 0.70   # early — peu d'UC, FDE focus deploy
    2027_h1: 0.65   # montée en charge, mix deploy/run
    2027_h2: 0.55   # plateforme commence à absorber le run
    2028: 0.40      # self-serve progressif, FDE sur nouveaux déploiements uniquement

fde_formula:
  # FDE headcount = (uc_in_deployment × 1.0) + (uc_in_run × 0.25)
  # uc_in_deployment = UC started within last deployment_duration_months
  fde_per_uc_deploying: 1.0
  fde_per_uc_in_run: 0.25

fde_capacity:
  # Legacy reference — formula now in fde_formula section.
  # Kept for backward compatibility with delivery_capacity table.
  use_cases_per_fde:
    2026: 2
    2027: 3
    2028: 4
  driver_of_improvement: Reusable playbooks, internal tooling, connectors, evaluation flows, and progressive self-serve deployment capabilities.

enterprise_cohort_plan:
  # Each entry: segment (ETI/GC/TGC), new logos, initial UC starts, expansion UC starts.
  # Pricing and FDE formulas derive from segment + UC counts.
  # UC goes live after deployment_duration_months (3 months).
  # Cycle de vente enterprise : 3-6 mois. Les nouveaux clients signent par vague trimestrielle,
  # pas chaque mois — gaps intentionnels pour refléter la réalité des cycles enterprise.
  monthly:
    # 2026 Q4 : Bouygues (GC) — deal en cours, deploy seed closing
    2026-09-01: {segment: GC, new_enterprise_accounts: 1, initial_use_case_starts: 2, expansion_use_case_starts: 0}

    # 2027 Q1 : 1 ETI signé + expansion Bouygues (cycle long, deal initié H2 2026)
    2027-02-01: {segment: ETI, new_enterprise_accounts: 1, initial_use_case_starts: 2, expansion_use_case_starts: 0}
    2027-03-01: {segment: GC,  new_enterprise_accounts: 0, initial_use_case_starts: 0, expansion_use_case_starts: 2}

    # 2027 Q2 : 1 ETI + 1 GC (pipeline construit H2 2026 → closes Q2)
    2027-05-01: {segment: ETI, new_enterprise_accounts: 1, initial_use_case_starts: 2, expansion_use_case_starts: 1}
    2027-06-01: {segment: GC,  new_enterprise_accounts: 1, initial_use_case_starts: 2, expansion_use_case_starts: 0}

    # 2027 Q3 : 2 ETI + 1 TGC (machine commerciale opérationnelle, cycles accélérés)
    2027-07-01: {segment: ETI, new_enterprise_accounts: 1, initial_use_case_starts: 2, expansion_use_case_starts: 1}
    2027-09-01: {segment: TGC, new_enterprise_accounts: 1, initial_use_case_starts: 3, expansion_use_case_starts: 1}

    # 2027 Q4 : 1 GC + expansion portefeuille
    2027-10-01: {segment: GC,  new_enterprise_accounts: 1, initial_use_case_starts: 2, expansion_use_case_starts: 2}
    2027-12-01: {segment: ETI, new_enterprise_accounts: 1, initial_use_case_starts: 2, expansion_use_case_starts: 2}

    # 2028 Q1 : accélération — 2 nouveaux + expansion
    2028-01-01: {segment: ETI, new_enterprise_accounts: 1, initial_use_case_starts: 2, expansion_use_case_starts: 2}
    2028-03-01: {segment: GC,  new_enterprise_accounts: 2, initial_use_case_starts: 3, expansion_use_case_starts: 2}

    # 2028 Q2
    2028-04-01: {segment: ETI, new_enterprise_accounts: 2, initial_use_case_starts: 3, expansion_use_case_starts: 3}
    2028-06-01: {segment: GC,  new_enterprise_accounts: 1, initial_use_case_starts: 2, expansion_use_case_starts: 3}

    # 2028 Q3
    2028-07-01: {segment: TGC, new_enterprise_accounts: 1, initial_use_case_starts: 3, expansion_use_case_starts: 3}
    2028-09-01: {segment: ETI, new_enterprise_accounts: 2, initial_use_case_starts: 3, expansion_use_case_starts: 4}

    # 2028 Q4
    2028-10-01: {segment: GC,  new_enterprise_accounts: 1, initial_use_case_starts: 2, expansion_use_case_starts: 4}
    2028-12-01: {segment: ETI, new_enterprise_accounts: 2, initial_use_case_starts: 3, expansion_use_case_starts: 4}

