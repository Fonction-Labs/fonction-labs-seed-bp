opex:
  # Non-headcount operating spend, exclusive of founder catch-up and payroll.
  # monthly_base = bureaux + admin/compta + marketing base + legal misc
  # NB: ai_tooling, saas_misc, infra_cloud, marketing_incremental sont des lignes séparées — ne pas les inclure ici.
  monthly_base_breakdown:
    # H2 2026 (~8 personnes, coworking)
    bureaux_coworking_2026_h2: 6000    # ~8 postes × 700€ coworking premium Paris
    admin_compta_2026_h2: 3000         # RH, compta, legal récurrent
    marketing_base_2026_h2: 3000       # contenu, outils, events mineurs
    misc_2026_h2: 2000                 # divers (assurances, frais bancaires, etc.)
    # 2027 (~13 personnes, bureau propre ou coworking élargi)
    bureaux_coworking_2027: 9000       # ~13 postes × 700€
    admin_compta_2027: 4000
    marketing_base_2027: 3000
    misc_2027: 2000
    # 2028 (~18 personnes)
    bureaux_coworking_2028: 12000      # ~18 postes × 650€
    admin_compta_2028: 5000
    marketing_base_2028: 4000
    misc_2028: 3000
  # Totaux dérivés utilisés dans le calcul (somme des sous-lignes ci-dessus)
  monthly_base_2026_h2: 14000
  monthly_base_2027: 18000
  monthly_base_2028: 24000
  enterprise_security_legal:
    2026-09-01: 40000
    2027-01-01: 30000
    2027-07-01: 30000
    2028-01-01: 40000
  # Marketing incremental (au-delà du ~3k/mois déjà dans monthly_base)
  marketing_incremental:
    monthly_2027: 5300
    monthly_2028: 9500
  # Infra décomposée en 4 sous-lignes (source T3.4)
  # Sous-ligne 1 — tokens clients (COGS) : calculé dynamiquement = nb_uc × avg_token_cost_per_uc_month
  # Sous-ligne 2 — infra cloud plateforme (COGS)
  infra_cloud_monthly:
    2026_h2: 7000
    2027_h1: 12000
    2027_h2: 17000
    2028_h1: 25000
    2028_h2: 25000
  # Sous-ligne 3 — AI dev tooling (OPEX) : calculé dynamiquement = nb_tech_headcount × ai_tooling_cost_per_person
  ai_tooling_cost_per_person_month: 1000
  # Sous-ligne 4 — SaaS divers (OPEX)
  saas_misc_monthly:
